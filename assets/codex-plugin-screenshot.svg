<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">codex-multitask screenshot</title>
  <desc id="desc">A marketing preview of parallel Codex workers with file ownership and status tracking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="1170" cy="130" r="260" fill="#2563eb" opacity="0.18"/>
  <circle cx="210" cy="780" r="300" fill="#38bdf8" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="110" y="92" width="1220" height="716" rx="34" fill="url(#panel)" stroke="#334155"/>
    <rect x="110" y="92" width="1220" height="72" rx="34" fill="#020617"/>
    <circle cx="156" cy="128" r="10" fill="#ef4444"/>
    <circle cx="188" cy="128" r="10" fill="#f59e0b"/>
    <circle cx="220" cy="128" r="10" fill="#22c55e"/>
    <text x="266" y="137" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#cbd5e1">codex-multitask run --workers 4 --isolated-workspaces</text>
    <text x="160" y="232" font-family="Inter, ui-sans-serif, system-ui" font-size="54" font-weight="800" fill="#f8fafc">Parallel Codex workers</text>
    <text x="160" y="278" font-family="Inter, ui-sans-serif, system-ui" font-size="24" fill="#93c5fd">One planner. Disjoint owned files. Tracked worker output.</text>
    <g transform="translate(160 340)">
      <rect width="250" height="260" rx="24" fill="#0f172a" stroke="#2563eb"/>
      <text x="28" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#60a5fa">W1 auth</text>
      <text x="28" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#bbf7d0">STATUS: ok</text>
      <text x="28" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#cbd5e1">owned_files</text>
      <text x="28" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">src/auth.ts</text>
      <text x="28" y="196" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">src/session.ts</text>
    </g>
    <g transform="translate(450 340)">
      <rect width="250" height="260" rx="24" fill="#0f172a" stroke="#2563eb"/>
      <text x="28" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#60a5fa">W2 api</text>
      <text x="28" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#bbf7d0">STATUS: ok</text>
      <text x="28" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#cbd5e1">jsonl events</text>
      <text x="28" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">turn.started</text>
      <text x="28" y="196" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">turn.completed</text>
    </g>
    <g transform="translate(740 340)">
      <rect width="250" height="260" rx="24" fill="#0f172a" stroke="#2563eb"/>
      <text x="28" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#60a5fa">W3 tests</text>
      <text x="28" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#fde68a">STATUS: partial</text>
      <text x="28" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#cbd5e1">needs review</text>
      <text x="28" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">focused tests</text>
      <text x="28" y="196" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">summary.json</text>
    </g>
    <g transform="translate(1030 340)">
      <rect width="250" height="260" rx="24" fill="#0f172a" stroke="#2563eb"/>
      <text x="28" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#60a5fa">W4 docs</text>
      <text x="28" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#bbf7d0">STATUS: ok</text>
      <text x="28" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#cbd5e1">patches</text>
      <text x="28" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">git apply --3way</text>
      <text x="28" y="196" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">isolated mode</text>
    </g>
    <rect x="160" y="650" width="1120" height="84" rx="20" fill="#020617" stroke="#1e40af"/>
    <text x="196" y="702" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#e0f2fe">final audit: changed paths subset of owned_files + baseline dirty state</text>
  </g>
</svg>
